<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang di Hotspot Ramdani</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1a0000, #330000, #660000);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('motor.jpg');
    opacity: 0.3;
    animation: moveStars 60s linear infinite;
}


        .login-box {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px red;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px red; }
            to { box-shadow: 0 0 25px orange; }
        }

        h1 {
            margin-bottom: 10px;
            color: orange;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, red, orange);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: linear-gradient(45deg, orange, red);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>

<body>

$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
    <input type="hidden" name="username" />
    <input type="hidden" name="password" />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <input type="hidden" name="popup" value="true" />
</form>

<script src="/md5.js"></script>
<script>
function doLogin() {
    document.sendin.username.value = document.login.username.value;
    document.sendin.password.value =
        hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
    document.sendin.submit();
    return false;
}
</script>
$(endif)

<div class="login-box"> 
    <h1>Hotspot Ramdani</h1>
    <p>Selamat datang di layanan internet hotspot</p>

    <form name="login" action="$(link-login-only)" method="post"
    $(if chap-id) onSubmit="return doLogin()" $(endif)>

        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">

        <input name="username" type="text" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <input type="submit" value="Masuk">
    </form>

    <div class="footer">
        Powered by MikroTik 🔥
    </div>
</div>

</body>
</html>
